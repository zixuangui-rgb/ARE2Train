# SFT 评测配置。

name: sft
description: 评测经过 SFT 的 Qwen3-14B。

model:
  family: qwen
  name: Qwen3-14B
  checkpoint: sft

method:
  training_stage: sft
  training_data:
    source: synthetic_scenarios
    filter: verifier_passed_trajectories

agent_runtime:
  name: official_openclaw
  modification: none

data:
  final_test: official_are_gaia2_heldout
  development: synthetic_validation
  official_heldout_used_for_training: false

metrics:
  primary:
    - overall_pass_rate
    - official_heldout_pass_rate
  capability:
    - tool_call_error_rate
    - clarification_accuracy
    - time_reasoning_accuracy
    - dynamic_event_handling_accuracy
  efficiency:
    - average_tool_calls
    - latency_per_task
    - token_usage_per_success
    - cost_per_success

logging:
  save_trace: true
  save_verifier_result: true
  save_failure_analysis: true
