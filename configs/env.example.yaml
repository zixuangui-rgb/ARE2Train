# ARE2Train 环境配置模板。
# 复制成 configs/env.local.yaml 后再填写本机路径。
# 不要把 API key 写进这个文件。

project:
  root: .
  runs_dir: runs
  logs_dir: logs
  artifacts_dir: artifacts
  checkpoints_dir: checkpoints
  data_dir: data

runtime:
  agent: official_openclaw
  agent_modification: none
  openclaw_home_env: ARE2TRAIN_OPENCLAW_HOME

model_server:
  provider: openai_compatible
  endpoint_env: ARE2TRAIN_MODEL_ENDPOINT
  default_model: Qwen3-14B

teacher_api:
  provider: tbd
  api_key_env: TEACHER_API_KEY

training:
  default_base_model: Qwen/Qwen3-14B
  output_dir: checkpoints

logging:
  save_trace: true
  save_verifier_result: true
  save_failure_analysis: true
  print_secret_values: false
